services:
  # Backend API Service
  - type: web
    name: songnotes-server
    runtime: node
    region: oregon  # Change to your preferred region
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false  # You'll set this in Render dashboard to your client URL
      # Add your other environment variables in Render dashboard:
      # - MONGODB_URI (your MongoDB connection string)
      # - JWT_SECRET (your JWT secret key)
      # - AZURE_STORAGE_CONNECTION_STRING (your Azure storage credentials)

  # Frontend Service (Static Site)
  - type: static
    name: songnotes-client
    region: oregon  # Change to your preferred region
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist  # Vite outputs to 'dist' folder
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        sync: false  # You'll set this in Render dashboard to your server URL
